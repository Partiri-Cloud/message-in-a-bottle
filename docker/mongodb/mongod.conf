# MongoDB configuration for message-in-a-bottle.
# Persistent storage is expected to be mounted at /app/data at runtime.

storage:
  # The persistent volume is mounted here; all database files live under it.
  dbPath: /app/data

net:
  port: 27017
  # Listen on all interfaces so other containers/pods can reach the database.
  bindIp: 0.0.0.0
