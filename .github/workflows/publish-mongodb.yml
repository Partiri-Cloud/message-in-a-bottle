name: Publish MongoDB

on:
  push:
    branches: [master]
    paths:
      - docker/mongodb/**
      - .github/workflows/publish-mongodb.yml
  workflow_dispatch:

env:
  IMAGE_NAME: miab-mongodb

jobs:
  docker:
    name: Build & Push MongoDB Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - id: version
        run: echo "version=$(cat docker/mongodb/VERSION)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Only build when docker/mongodb/VERSION names a tag that isn't published
      # yet — editing the Dockerfile without bumping VERSION is a no-op.
      - id: check
        run: |
          image="ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
          if docker manifest inspect "${image}:${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Version ${{ steps.version.outputs.version }} already published, skipping"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/metadata-action@v6
        if: steps.check.outputs.publish == 'true'
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        if: steps.check.outputs.publish == 'true'
        with:
          context: docker/mongodb
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
